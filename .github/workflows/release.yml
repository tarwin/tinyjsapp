name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  TJS_VERSION: v26.6.0

jobs:
  # Windows binaries: built here, shipped by the release job below so one
  # checksums.txt covers every asset.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: choco install mingw -y --no-progress

      - name: Build (setup.ps1 — fetch tjs.exe + WebView2 header, compile launcher)
        run: powershell -ExecutionPolicy Bypass -File setup.ps1 -SkipPath

      - name: Stamp version
        run: echo "${env:GITHUB_REF_NAME}" | Out-File -Encoding ascii -NoNewline VERSION

      - name: Assemble zip
        run: |
          $stage = "stage"
          New-Item -ItemType Directory -Force "$stage\bin", "$stage\native" | Out-Null
          Copy-Item bin\tjs.exe "$stage\bin\"
          Copy-Item native\launcher-win.exe "$stage\native\"
          Copy-Item -Recurse runtime, template, test, skill "$stage\"
          Copy-Item cli.js, tinyjs.cmd, VERSION, README.md, LICENSE "$stage\"
          New-Item -ItemType Directory -Force out | Out-Null
          # Zip the CONTENTS (no wrapper dir): install.ps1 extracts straight
          # into the install dir.
          Compress-Archive -Path "$stage\*" -DestinationPath out\tinyjs-windows-x86_64.zip

      - name: Smoke test (build pipeline; no GUI on a runner)
        run: |
          $ErrorActionPreference = 'Stop'
          $extract = Join-Path $env:TEMP 'tinyjs-ci'
          Expand-Archive out\tinyjs-windows-x86_64.zip $extract
          & "$extract\tinyjs.cmd" version
          $work = Join-Path $env:TEMP 'tinyjs-ci-work'
          New-Item -ItemType Directory -Force $work | Out-Null
          Set-Location $work
          & "$extract\tinyjs.cmd" new ci-check
          if ($LASTEXITCODE -ne 0) { throw 'new failed' }
          Set-Location ci-check
          & "$extract\tinyjs.cmd" build
          if ($LASTEXITCODE -ne 0) { throw 'build failed' }
          if (-not (Test-Path dist\ci-check.exe)) { throw 'missing dist\ci-check.exe' }
          if (-not (Test-Path dist\launcher.exe)) { throw 'missing dist\launcher.exe' }
          Write-Host 'windows build pipeline OK'

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: out/tinyjs-windows-x86_64.zip

  release:
    runs-on: macos-14
    needs: windows
    steps:
      - uses: actions/checkout@v4

      - name: Build universal launcher
        run: |
          ./native/gen-client.sh
          c++ -std=c++17 -x objective-c++ -Inative/include native/launcher.cc \
            -o native/launcher -framework WebKit -framework AppKit -framework Carbon -framework UserNotifications -framework AVFoundation -framework ServiceManagement -framework IOKit -framework Quartz -weak_framework ScreenCaptureKit -framework Vision -framework QuickLookThumbnailing -framework Security -framework LocalAuthentication -framework MediaPlayer -framework CoreMedia -framework CoreWLAN -framework CoreAudio -framework AudioToolbox -ldl \
            -arch arm64 -arch x86_64
          codesign --force --sign - native/launcher

      - name: Stamp version
        run: echo "${GITHUB_REF_NAME}" > VERSION

      - name: Assemble per-arch tarballs
        run: |
          set -e
          mkdir -p out
          for ARCH in arm64 x86_64; do
            curl -fsSL -o /tmp/tjs-$ARCH.zip \
              "https://github.com/saghul/txiki.js/releases/download/${TJS_VERSION}/txiki-macos-$ARCH.zip"
            unzip -q -o /tmp/tjs-$ARCH.zip -d /tmp/tjs-$ARCH

            STAGE=/tmp/stage-$ARCH/tinyjs
            mkdir -p "$STAGE/bin" "$STAGE/native"
            cp "/tmp/tjs-$ARCH/txiki-macos-$ARCH/tjs" "$STAGE/bin/tjs"
            chmod +x "$STAGE/bin/tjs"
            cp native/launcher native/make-icon.jxa "$STAGE/native/"
            cp -R runtime template test skill "$STAGE/"
            cp cli.js tinyjs VERSION README.md LICENSE "$STAGE/"

            tar -czf "out/tinyjs-macos-$ARCH.tar.gz" -C "/tmp/stage-$ARCH" tinyjs
          done

      - name: Fetch Windows zip
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: out

      - name: Checksums (all assets)
        run: (cd out && shasum -a 256 *.tar.gz *.zip > checksums.txt && cat checksums.txt)

      - name: Smoke test (native arch)
        run: |
          tar -xzf out/tinyjs-macos-arm64.tar.gz -C /tmp
          cd "$(mktemp -d)"
          /tmp/tinyjs/tinyjs version
          /tmp/tinyjs/tinyjs new ci-check
          # GUI can't open on a headless runner; verify the build pipeline only.
          cd ci-check && /tmp/tinyjs/tinyjs build
          test -x dist/ci-check && test -d dist/ci-check.app
          codesign --verify --strict --deep dist/ci-check.app
          echo "build + bundle signature OK"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" out/*.tar.gz out/*.zip out/checksums.txt \
            --title "tinyjs ${GITHUB_REF_NAME}" \
            --generate-notes
